# Bastion Pitch Video Configuration
# This config builds a pitch video with problem/solution/impact flow.
#
# Usage:
#   python -m command.content.video_pipeline c:\Code\bastion\video_config_pitch.yaml
#   python -m command.content.video_pipeline c:\Code\bastion\video_config_pitch.yaml --force

project_name: Bastion
project_tagline: Enforcement at the Token Level
team_name: Libruary
hackathon_name: StableHacks 2026

# App setup
app_directory: c:\Code\bastion
dev_server_command: npx next dev --port 3099
dev_server_port: 3099  # Use non-standard port to avoid conflicts
dev_server_ready_url: /

# Video output
output_directory: c:\Code\bastion\demos\pitch
resolution: [1920, 1080]

# Voice settings
voice_name: onyx
voice_speed: 0.92

# Title card settings
intro_duration: 4.0
outro_duration: 6.0
intro_text: Bastion
outro_text: Bastion

# Branding
domain: bastion.solana
intro_bg_color: "0x0a0a0b"
outro_bg_color: "0x0a0a0b"

# Scenes to record
scenes:
  - name: opening
    narration: "How do institutions manage stablecoin treasuries on-chain? The answer: they can't. Not yet."
    url_path: /
    wait_ms: 500

  - name: problem_intro
    narration: "Existing vaults have no KYC gates, no spending controls, no audit trail. They're not compliant. Regulators won't touch them."
    wait_ms: 1000

  - name: solution_intro
    narration: "Bastion solves this with a breakthrough idea: enforcement at the token level. Not the application. The token."
    wait_ms: 1000

  - name: transfer_hooks
    narration: "Using Solana Token-2022 Transfer Hooks, Bastion checks every transfer — via UI, via CLI, via DEX, via bridge — doesn't matter. Compliance is enforced before the token moves."
    click_selectors: ["button:has-text('Explore Live Demo')"]
    wait_ms: 1500

  - name: competitive_edge
    narration: "This means compliance can't be bypassed. It's cryptographically proven. On Ethereum, this would cost fifty dollars per transaction. On Solana, it's one quarter of one cent."
    wait_ms: 500

  - name: dashboard_show
    narration: "This is the live vault dashboard. Every role, every transaction, every compliance check — visible and auditable in real time."
    wait_ms: 500

  - name: members_and_controls
    narration: "Roles define permissions. Spending limits are enforced at every level. No exceptions, no workarounds."
    click_selectors: ["button:has-text('Members')"]
    wait_ms: 1000

  - name: compliance_proof
    narration: "And this is where it matters most — every action logged, timestamped, and cryptographically proven. This is what regulators want to see."
    click_selectors: ["button:has-text('Compliance')"]
    wait_ms: 500

  - name: team_and_track_record
    narration: "Built by Justin and Libruary. We've shipped DeFi infrastructure on Flow and Solana. This is what we know how to build."
    wait_ms: 1500

  - name: close
    narration: "Bastion is live on Solana Devnet now. Visit github.com/LibruaryNFT/bastion to see the code."
    url_path: /
    wait_ms: 500
