# Bastion Technical Demo Video Configuration
# This is a reproducible config for building the demo video from scratch.
#
# Usage:
#   python -m command.content.video_pipeline c:\Code\bastion\video_config_technical_demo.yaml
#   python -m command.content.video_pipeline c:\Code\bastion\video_config_technical_demo.yaml --force

project_name: Bastion
project_tagline: Institutional-Grade Treasury Management for Solana
team_name: Libruary
hackathon_name: StableHacks 2026

# App setup
app_directory: c:\Code\bastion
dev_server_command: npm run dev
dev_server_port: 3000
dev_server_ready_url: /

# Video output
output_directory: c:\Code\bastion\demos\technical_demo
resolution: [1920, 1080]

# Voice settings
voice_name: onyx
voice_speed: 0.92

# Title card settings
intro_duration: 4.0
outro_duration: 6.0
intro_text: Bastion
outro_text: Bastion

# Branding
domain: bastion.solana
intro_bg_color: "0x0a0a0b"
outro_bg_color: "0x0a0a0b"

# Scenes to record
# Each scene: name, narration, url_path (optional), click_selectors (optional), scroll_to (optional), wait_ms (optional)
scenes:
  - name: landing_page
    narration: "Bastion brings institutional-grade treasury management to Solana. This is compliance at the token level — enforcement that can't be bypassed."
    url_path: /
    wait_ms: 500

  - name: demo_mode
    narration: "To see the full platform, click Explore Live Demo. This takes you directly into a vault with realistic institutional data."
    url_path: /
    click_selectors: ["button:has-text('Explore Live Demo')"]
    wait_ms: 1500

  - name: vault_dashboard
    narration: "The Vault Dashboard shows total assets under management, current balance, and real-time approval status. Each role has spending limits — daily caps, weekly caps, enforced on-chain."
    wait_ms: 500

  - name: members_tab
    narration: "In the Members tab, admins manage role-based access. Admin can do everything. Manager approves large withdrawals. Operator executes transfers within their limits. Viewer is read-only."
    click_selectors: ["button:has-text('Members')"]
    wait_ms: 1000

  - name: withdrawals_tab
    narration: "The Withdrawals tab is where the Travel Rule comes in. For transfers three thousand dollars or larger, the form automatically expands to collect originator and beneficiary information — required by international anti-money-laundering rules."
    click_selectors: ["button:has-text('Withdrawals')"]
    wait_ms: 1000

  - name: travel_rule_form
    narration: "Notice the Travel Rule form. It requires originator wallet, beneficiary wallet, and purpose of transfer. This data is submitted on-chain with the token itself — no application can intercept it."
    scroll_to: 400
    wait_ms: 1000

  - name: compliance_tab
    narration: "The Compliance tab shows AML screening results, KYC status for each vault member, and compliance scores. Everything is auditable."
    click_selectors: ["button:has-text('Compliance')"]
    wait_ms: 1000

  - name: audit_trail
    narration: "And finally, the Audit Trail. Every action — deposit, withdrawal, role change, KYC update — is logged with timestamps and regulatory context. This is immutable proof of institutional controls, on the blockchain."
    click_selectors: ["button:has-text('Audit Trail')"]
    wait_ms: 500
