name: Build and Deploy Bastion Program

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'programs/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79.0

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.30.1
          avm use 0.30.1
          anchor --version

      - name: Configure Solana
        run: |
          solana config set --url devnet
          solana-keygen new --no-passphrase -o ~/.config/solana/id.json --force
          solana --version

      - name: Build Program
        run: |
          anchor build
          ls -la target/deploy/

      - name: Upload Program Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-program
          path: |
            target/deploy/bastion.so
            target/idl/bastion.json
          retention-days: 30
