name: Build and Deploy Bastion Program

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'programs/**'
      - '.github/workflows/**'
      - 'Cargo.toml'
      - 'Anchor.toml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana and Anchor
        uses: heyAyushh/setup-anchor@v4.999
        with:
          anchor-version: '0.31.1'
          solana-cli-version: '2.1.21'
          node-version: '20'

      - name: Configure Solana
        run: |
          solana config set --url devnet
          solana-keygen new --no-passphrase -o ~/.config/solana/id.json --force
          anchor --version
          solana --version
          rustc --version

      - name: Generate Cargo.lock with compatible deps
        run: |
          cd programs/bastion
          # Pin toml_parser to version that doesn't need edition2024
          cargo generate-lockfile
          # Replace any edition2024 deps
          cargo update toml_parser@1.1.0 --precise 0.23.1 2>/dev/null || true
          cargo update getrandom@0.4.2 --precise 0.2.15 2>/dev/null || true

      - name: Build Program
        run: |
          anchor build
          ls -la target/deploy/

      - name: Upload Program Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-program
          path: |
            target/deploy/bastion.so
            target/idl/bastion.json
          retention-days: 30
