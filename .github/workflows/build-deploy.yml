name: Build and Deploy Bastion Program

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'programs/**'
      - '.github/workflows/**'
      - 'Cargo.toml'
      - 'Anchor.toml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana and Anchor
        uses: heyAyushh/setup-anchor@v4.999
        with:
          anchor-version: '0.30.1'
          solana-cli-version: '2.1.21'
          node-version: '20'

      - name: Configure Solana
        run: |
          solana config set --url devnet
          solana-keygen new --no-passphrase -o ~/.config/solana/id.json --force
          anchor --version
          solana --version

      - name: Build Program
        run: |
          anchor build
          ls -la target/deploy/

      - name: Upload Program Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-program
          path: |
            target/deploy/bastion.so
            target/idl/bastion.json
          retention-days: 30
