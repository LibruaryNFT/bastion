<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" rx="64" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="240" cy="200" r="180" fill="url(#glow)"/>

  <!-- Shield/Vault outline -->
  <path d="M240 60 L380 130 L380 260 Q380 360 240 420 Q100 360 100 260 L100 130 Z"
        fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.4"/>

  <!-- Inner shield -->
  <path d="M240 90 L355 148 L355 252 Q355 335 240 388 Q125 335 125 252 L125 148 Z"
        fill="url(#accent)" opacity="0.08"/>

  <!-- Bold B letter -->
  <text x="240" y="295"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="220"
        font-weight="800"
        fill="url(#accent)"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-8">B</text>

  <!-- Lock/keyhole detail -->
  <circle cx="240" cy="235" r="18" fill="none" stroke="#818cf8" stroke-width="4" opacity="0.5"/>
  <rect x="234" y="248" width="12" height="22" rx="3" fill="#818cf8" opacity="0.5"/>

  <!-- Bottom text -->
  <text x="240" y="440"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="600"
        fill="#9ca3af"
        text-anchor="middle"
        letter-spacing="8">BASTION</text>
</svg>
